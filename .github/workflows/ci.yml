name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Test
        run: python -m pytest

      - name: Smoke default Uvicorn health endpoint
        run: |
          set -eu
          python -m uvicorn urbanflow.api.app:app --host 127.0.0.1 --port 8765 > uvicorn.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          ready=0
          for attempt in $(seq 1 80); do
            if python -c "import json, urllib.request; body = json.load(urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=1)); assert body['status'] == 'degraded'"; then
              ready=1
              break
            fi
            sleep 0.25
          done
          if [ "$ready" -ne 1 ]; then
            cat uvicorn.log
            exit 1
          fi
